name: Publish to VS Code Marketplace

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          npm version $NEW_VERSION --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Commit version bump
        env:
          HUSKY: "0"
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag -f "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags --force

  publish:
    needs: bump
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: "darwin-arm64 darwin-x64"
          - os: ubuntu-latest
            targets: "linux-x64 linux-arm64"
          - os: windows-latest
            targets: "win32-x64 win32-arm64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile
        run: npm run compile

      - name: Publish targets
        shell: bash
        run: |
          for target in ${{ matrix.targets }}; do
            echo "Publishing $target v${{ needs.bump.outputs.version }}..."
            npx @vscode/vsce publish --target $target \
              --pat "${{ secrets.VSCE_PAT }}" \
              --allow-missing-repository || true
          done

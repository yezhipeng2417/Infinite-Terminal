name: Publish to VS Code Marketplace

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          npm version $NEW_VERSION --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile
        run: npm run compile

      # Build and publish darwin-arm64
      - name: Publish darwin-arm64
        run: npx @vscode/vsce publish --target darwin-arm64 --pat "${{ secrets.VSCE_PAT }}" --allow-missing-repository
        continue-on-error: true

      # Build and publish linux-x64
      - name: Publish linux-x64
        run: npx @vscode/vsce publish --target linux-x64 --pat "${{ secrets.VSCE_PAT }}" --allow-missing-repository
        continue-on-error: true

      # Build and publish linux-arm64
      - name: Publish linux-arm64
        run: npx @vscode/vsce publish --target linux-arm64 --pat "${{ secrets.VSCE_PAT }}" --allow-missing-repository
        continue-on-error: true

      # Build and publish darwin-x64
      - name: Publish darwin-x64
        run: npx @vscode/vsce publish --target darwin-x64 --pat "${{ secrets.VSCE_PAT }}" --allow-missing-repository
        continue-on-error: true

      - name: Commit version bump
        env:
          HUSKY: "0"
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags
